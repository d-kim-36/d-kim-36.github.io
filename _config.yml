remote_theme: "mmistakes/minimal-mistakes"

# Plugins required for remote theme
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-sitemap

# ── Site Identity ──────────────────────────────────────────────────────────────
title: "Deoksoon Kim"
title_separator: "–"
subtitle: "Professor, Boston College"
description: "Research publications, academic experience, and professional biography of Deoksoon Kim, Ph.D., Professor at Boston College."
url: "https://d-kim-36.github.io"
locale: "en-US"

# ── Theme Skin ─────────────────────────────────────────────────────────────────
# Placeholder skin — will be replaced by custom SCSS overrides in Handoff #2.
minimal_mistakes_skin: "default"

# Hide MM's auto-rendered feed link in masthead/head; we don't publish a feed.
atom_feed:
  hide: true

# ── Author Profile (Left Sidebar) ─────────────────────────────────────────────
author:
  name: "Deoksoon Kim, Ph.D."
  bio: >
    Professor at the Lynch School of Education and Human Development, Boston College.
    My research focuses on understanding the needs of immigrant students to facilitate
    English acquisition and academic success through instructional technology.
  location: "Lynch School of Education, Boston College"
  avatar: "/assets/images/avatar.jpg"
  links:
    # Confirmed URLs from existing site
    - label: "Google Scholar"
      icon: "fab fa-fw fa-google"
      url: "https://scholar.google.com/citations?hl=en&user=YvCec_sAAAAJ"
    - label: "YouTube (TLab)"
      icon: "fab fa-fw fa-youtube"
      url: "https://www.youtube.com/@TLABTogether"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/deoksoon-kim-5a58ba39"
    - label: "ResearchGate"
      icon: "fab fa-fw fa-researchgate"
      url: "https://www.researchgate.net/profile/Deoksoon-Kim"

# ── Page Defaults ──────────────────────────────────────────────────────────────
defaults:
  # All pages: persistent author sidebar
  - scope:
      path: ""
    values:
      layout: "single"
      author_profile: true
      read_time: false
      show_date: false
      share: false
      related: false

# ── Build Settings ─────────────────────────────────────────────────────────────
markdown: kramdown
kramdown:
  input: GFM
  parse_block_html: true   # allows HTML blocks inside Markdown (maps, iframes, scripts)
highlighter: rouge
permalink: pretty
timezone: America/New_York

# Sass
sass:
  style: compressed

# Exclude from build
exclude:
  - vendor/
  - node_modules/
  - Gemfile
  - Gemfile.lock
  - README.md
  - AGENTS.md
  - CLAUDE.md
  - DESIGN.md
  - package.json
  - package-lock.json
  - playwright.config.js
  - lighthouserc.json
  - tests/
