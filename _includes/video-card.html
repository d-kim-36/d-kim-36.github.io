<div class="content-card">
  <div class="card-media">
    <iframe
      src="https://www.youtube.com/embed/{{ include.id }}"
      title="{{ include.title }}"
      allowfullscreen
      loading="lazy">
    </iframe>
  </div>
  <div class="card-body">
    <span class="card-title">{{ include.title }}</span>
    <p class="card-desc">{{ include.desc }}</p>
  </div>
</div>
