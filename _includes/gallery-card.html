<a href="{{ include.image }}"
   data-sub-html="<div style='text-align:center;'><h4 style='color:#fff;margin-bottom:5px;'>{{ include.title }}</h4><p style='color:#ccc;margin:0;'>{{ include.sub }}</p></div>">
  <div class="content-card">
    <div class="card-media">
      <img src="{{ include.image }}" alt="{{ include.title }}" loading="lazy">
    </div>
    <div class="card-body">
      <span class="card-title">{{ include.title }}</span>
      <p class="card-desc">{{ include.desc }}</p>
    </div>
  </div>
</a>
