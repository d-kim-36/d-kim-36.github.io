<div class="content-card">
  <div class="card-media">
    <iframe
      src="https://www.youtube.com/embed/{{ .Get "id" }}"
      allowfullscreen
      loading="lazy">
    </iframe>
  </div>
  <div class="card-body">
    <span class="card-title">{{ .Get "title" }}</span>
    <p class="card-desc">{{ .Get "desc" }}</p>
  </div>
</div>
