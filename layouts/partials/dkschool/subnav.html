<style>
  :root {
    --dk-primary: rgb(105, 8, 7);
    --dk-secondary: rgb(155, 118, 60);
    --dk-light: #f9f6f2;
    --dk-white: #ffffff;
    --dk-text: rgb(31, 41, 55);
    --dk-muted: rgb(108, 108, 108);
    --dk-border: rgb(238, 238, 238);
    --dk-radius: 8px;
  }

  /* ── DARK MODE ── */
  .dark {
    --dk-primary: rgb(218, 218, 219);
    --dk-secondary: rgb(180, 145, 90);
    --dk-light: rgb(29, 30, 32);
    --dk-white: rgb(46, 46, 51);
    --dk-text: rgb(196, 196, 197);
    --dk-muted: rgb(155, 156, 157);
    --dk-border: rgb(51, 51, 51);
  }

  /* Hero stays burgundy in dark mode — only lighten it slightly */
  .dark .dk-hero,
  .dark .dk-page-hero {
    background: rgb(80, 6, 5);
  }

  /* Section alt background matches dark theme bg */
  .dark .dk-section-alt {
    background: rgb(29, 30, 32);
  }

  .dk-subnav {
    background: var(--dk-white);
    border-bottom: 1px solid var(--dk-border);
    position: sticky;
    top: 60px;
    z-index: 90;
  }
  .dk-subnav-inner {
    max-width: 1024px;
    margin: 0 auto;
    padding: 0 24px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .dk-subnav-logo {
    font-weight: 700;
    font-size: 16px;
    color: var(--dk-primary);
    text-decoration: none;
  }
  .dk-subnav-links {
    display: flex;
    gap: 28px;
    list-style: none;
  }
  .dk-subnav-links a {
    text-decoration: none;
    font-size: 14px;
    color: var(--dk-muted);
    transition: color 0.2s;
  }
  .dk-subnav-links a:hover,
  .dk-subnav-links a.dk-active { color: var(--dk-primary); font-weight: 600; }

  /* ── SHARED SECTION STYLES ── */
  .dk-hero {
    background: var(--dk-primary);
    color: #fff;
    text-align: center;
    padding: 80px 24px 64px;
  }
  .dk-hero h1 {
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 700;
    margin-bottom: 14px;
    letter-spacing: -0.5px;
    color: #fff !important;
  }
  .dk-hero p {
    font-size: clamp(15px, 1.8vw, 18px);
    opacity: 0.85;
    max-width: 520px;
    margin: 0 auto 36px;
    line-height: 1.6;
    color: #fff !important;
  }
  .dk-cta-btn {
    display: inline-block;
    background: var(--dk-secondary);
    color: #fff;
    text-decoration: none;
    font-weight: 600;
    font-size: 16px;
    padding: 14px 36px;
    border-radius: var(--dk-radius);
    letter-spacing: 0.5px;
    transition: opacity 0.2s, transform 0.15s;
  }
  .dk-cta-btn:hover { opacity: 0.9; transform: translateY(-2px); }

  .dk-section {
    max-width: 1024px;
    margin: 0 auto;
    padding: 60px 24px;
  }
  .dk-section-alt { background: var(--dk-white); }
  .dk-section h2 {
    font-size: 26px;
    font-weight: 700;
    color: var(--dk-primary);
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--dk-secondary);
    display: inline-block;
  }
  .dk-placeholder {
    background: var(--dk-white);
    border: 1px solid var(--dk-border);
    border-radius: var(--dk-radius);
    padding: 36px 28px;
    color: var(--dk-muted);
    font-size: 15px;
    line-height: 1.7;
  }
  .dk-section-alt .dk-placeholder { background: var(--dk-light); }
  .dk-placeholder em {
    color: var(--dk-secondary);
    font-style: normal;
    font-weight: 500;
  }
</style>

<nav class="dk-subnav">
  <div class="dk-subnav-inner">
    <a class="dk-subnav-logo" href="/dkschool/">DK English School</a>
    <ul class="dk-subnav-links">
      <li><a href="/dkschool/teams/" {{ if eq .RelPermalink "/dkschool/teams/" }}class="dk-active"{{ end }}>Our Teams</a></li>
      <li><a href="/dkschool/programs/" {{ if eq .RelPermalink "/dkschool/programs/" }}class="dk-active"{{ end }}>Programs</a></li>
    </ul>
  </div>
</nav>
